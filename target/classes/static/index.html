<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header class="navbar">
            <div class="logo">
                <span class="logo-icon">🎓</span>
                <h1>Student Hub</h1>
            </div>
            <button class="primary-btn" id="addStudentBtn">
                <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                </svg>
                Add Student
            </button>
        </header>

        <main class="content">
            <div class="table-container">
                <div class="table-header">
                    <h2>Enrolled Students</h2>
                    <div class="search-box">
                        <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                        </svg>
                        <input type="text" id="searchInput" placeholder="Search students...">
                    </div>
                </div>

                <table id="studentsTable">
                    <thead>
                        <tr>
                            <th>Student</th>
                            <th>Email</th>
                            <th>Department</th>
                            <th>Enrollment Date</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="studentList">
                        <!-- Student rows injected via JS -->
                    </tbody>
                </table>
                
                <div class="empty-state" id="emptyState" style="display: none;">
                    <div class="empty-icon">📂</div>
                    <h3>No students found</h3>
                    <p>Get started by adding a new student to the system.</p>
                </div>
                
                <div class="loading-state" id="loadingState">
                    <div class="spinner"></div>
                    <p>Loading students...</p>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal Form -->
    <div class="modal-overlay" id="studentModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">New Student</h3>
                <button class="close-btn" id="closeModalBtn">&times;</button>
            </div>
            <form id="studentForm">
                <input type="hidden" id="studentId">
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="firstName">First Name</label>
                        <input type="text" id="firstName" required minlength="2">
                    </div>
                    <div class="form-group">
                        <label for="lastName">Last Name</label>
                        <input type="text" id="lastName" required minlength="2">
                    </div>
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="department">Department</label>
                        <select id="department" required>
                            <option value="" disabled selected>Select Department</option>
                            <option value="Computer Science">Computer Science</option>
                            <option value="Engineering">Engineering</option>
                            <option value="Business">Business</option>
                            <option value="Arts">Arts</option>
                            <option value="Science">Science</option>
                            <option value="Mathematics">Mathematics</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="enrollmentDate">Enrollment Date</label>
                        <input type="date" id="enrollmentDate" required>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="button" class="secondary-btn" id="cancelBtn">Cancel</button>
                    <button type="submit" class="primary-btn">Save Student</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Notification Toast -->
    <div class="toast" id="toast">
        <span id="toastMessage">Success!</span>
    </div>

    <script src="app.js"></script>
</body>
</html>
